<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Test - M3 Dark</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap');

    :root {
      --primary: #D0BCFF;
      --on-primary: #381E72;
      --surface: #141218;
      --surface-2: #1D1B20;
      --surface-3: #2B2930;
      --on-surface: #E6E0E9;
      --on-surface-variant: #CAC4D0;
      --outline: #938F99;
      --error: #F2B8B5;
      --untyped: #49454F;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { 
      box-sizing: border-box; 
      -webkit-tap-highlight-color: transparent; 
    }

    ::selection {
      background-color: rgba(208, 188, 255, 0.2);
      color: inherit;
    }

    body {
      background-color: var(--surface);
      color: var(--on-surface);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      overflow: hidden;
    }

    button {
      outline: none;
      font-family: inherit;
    }

    button:focus-visible, .word-count-btn:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
      border-radius: inherit;
    }

    #app {
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      min-height: 100dvh;
      height: auto;
      padding: 20px;
      padding-bottom: 30dvh; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
    }

    #header-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 24px;
    }

    .settings-badge {
      background-color: var(--surface-2);
      color: var(--on-surface-variant);
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1px solid var(--outline);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background-color 0.2s, color 0.2s;
    }
    
    .settings-badge:hover { 
      background-color: var(--surface-3);
      color: var(--on-surface); 
    }

    #live-stats-container {
      display: flex;
      gap: 16px;
      font-size: 1rem;
      font-weight: 500;
      color: var(--primary);
      opacity: 0;
      transition: opacity 0.3s;
    }

    #live-stats-container.visible {
      opacity: 1;
    }

    #settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background-color: rgba(20, 18, 24, 0.6);
      backdrop-filter: blur(4px);
      z-index: 90;
    }

    #settings-menu {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      flex-direction: column;
      align-items: center;
      gap: 24px;
      background-color: var(--surface-2);
      padding: 32px;
      border-radius: 28px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2), 0 24px 38px rgba(0,0,0,0.14);
      z-index: 100;
      width: 90%;
      max-width: 400px;
    }

    .settings-title {
      color: var(--on-surface);
      font-size: 1.5rem;
      font-weight: 400;
    }

    #settings-options {
      display: flex;
      border: 1px solid var(--outline);
      border-radius: 100px;
      overflow: hidden;
    }

    .word-count-btn {
      background: transparent;
      border: none;
      border-right: 1px solid var(--outline);
      color: var(--on-surface-variant);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
      padding: 10px 20px;
    }

    .word-count-btn:last-child {
      border-right: none;
    }

    .word-count-btn:hover {
      background-color: rgba(208, 188, 255, 0.08);
      color: var(--on-surface);
    }

    .word-count-btn.active {
      background-color: var(--primary);
      color: var(--on-primary);
    }

    #progress {
      font-size: 1.25rem;
      color: var(--primary);
      margin-bottom: 12px;
      font-weight: 500;
      width: 100%;
      text-align: left;
      font-variant-numeric: slashed-zero;
    }

    #typing-area {
      position: relative;
      height: 160px;
      line-height: 55px;
      font-size: 36px;
      font-family: 'Roboto Mono', monospace;
      overflow: hidden;
      width: 100%;
      text-align: left;
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
      mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
    }

    #focus-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--on-surface);
      font-size: 1.1rem;
      font-family: system-ui, sans-serif;
      text-align: center;
      z-index: 20;
      transition: opacity 0.2s;
      cursor: pointer;
      background: rgba(20, 18, 24, 0.8);
      border-radius: 12px;
    }

    #typing-area.is-focused #focus-overlay {
      opacity: 0;
      pointer-events: none;
    }

    #typing-area:not(.is-focused) #moving-canvas {
      filter: blur(4px);
    }

    #moving-canvas {
      position: relative;
      transition: transform 0.25s ease-out, filter 0.2s;
    }

    .word {
      display: inline-block;
      margin-right: 15px;
    }
    
    .char {
      transition: color 0.1s;
      position: relative;
      color: var(--untyped);
    }

    .correct { color: var(--on-surface); }
    .incorrect { 
      color: var(--error); 
      background-color: rgba(242, 184, 181, 0.15); 
      border-radius: 2px;
    }

    #caret {
      position: absolute;
      width: 3px;
      height: 40px;
      background-color: var(--primary);
      transition: left 0.1s ease, top 0.1s ease;
      margin-top: 8px;
      border-radius: 2px;
      z-index: 10;
    }
    
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    .blink { animation: blink 1s infinite; }
    .typing { animation: none; opacity: 1; }

    #hidden-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .action-container {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 32px;
    }

    .action-btn {
      color: var(--on-surface-variant);
      background: transparent;
      border: none;
      padding: 12px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.2s, color 0.2s;
    }

    .action-btn:hover { 
      background-color: var(--surface-3);
      color: var(--on-surface); 
    }

    #result {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background-color: var(--surface-2);
      padding: 40px;
      border-radius: 28px;
    }

    .score-group {
      display: flex;
      gap: 48px;
      margin-bottom: 24px;
    }

    .score-item {
      display: flex;
      flex-direction: column;
    }

    .score-title { font-size: 1rem; color: var(--on-surface-variant); margin-bottom: 8px; }
    .score-value { font-size: 4.5rem; color: var(--primary); line-height: 1; font-weight: 500; font-family: 'Roboto Mono', monospace; }

    #history-panel {
      position: fixed;
      bottom: calc(20px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 600px;
      background-color: var(--surface-2);
      border-radius: 16px;
      padding: 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 50;
      opacity: 1;
      pointer-events: auto;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    #history-panel.is-hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-50%) translateY(12px);
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      color: var(--on-surface-variant);
      font-size: 0.9rem;
      border-bottom: 1px solid var(--surface-3);
      padding-bottom: 8px;
    }

    .history-best {
      color: var(--primary);
      font-weight: 500;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--on-surface);
    }

    .history-row {
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

  <div id="settings-overlay"></div>
  <div id="settings-menu" role="dialog" aria-modal="true" aria-labelledby="settings-title">
    <div id="settings-title" class="settings-title">Kata (Words)</div>
    <div id="settings-options"></div>
  </div>

  <div id="app">
    <div id="header-area" class="screen-only">
      <button class="settings-badge" id="settings-toggle" aria-label="Pengaturan">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        Pengaturan
      </button>
      <div id="live-stats-container">
        <div>WPM: <span id="live-wpm">0</span></div>
        <div>ACC: <span id="live-acc">100</span>%</div>
      </div>
    </div>

    <div id="progress" class="screen-only">0/0</div>

    <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    
    <div id="typing-area" class="screen-only">
      <div id="focus-overlay">Sentuh layar atau ketik untuk mulai</div>
      <div id="moving-canvas">
        <div id="text-wrapper"></div>
        <div id="caret" class="blink"></div>
      </div>
    </div>
    
    <div class="action-container screen-only">
      <button id="restart-hint" class="action-btn" aria-label="Ulangi Teks Ini" title="Ulangi">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      </button>
      <button id="next-hint" class="action-btn" aria-label="Teks Baru" title="Teks Baru">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <div id="result">
      <div class="score-group">
        <div class="score-item">
          <div class="score-title">wpm</div>
          <div class="score-value" id="wpm">0</div>
        </div>
        <div class="score-item">
          <div class="score-title">acc</div>
          <div class="score-value" id="accuracy">0%</div>
        </div>
      </div>
      
      <div class="action-container">
        <button id="restart-btn-result" class="action-btn" aria-label="Ulangi Teks Ini" title="Ulangi">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
        <button id="next-btn-result" class="action-btn" aria-label="Teks Baru" title="Teks Baru">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="history-panel">
    <div class="history-header">
      <span>Riwayat</span>
      <span class="history-best" id="best-score-display">Best: -</span>
    </div>
    <div class="history-list" id="history-list"></div>
  </div>

  <script>
    const WORD_LIST = ["tahu", "enggak", "kenapa", "senja", "selalu", "indah", "karena", "ia", "berakhir", "seperti", "kode", "yang", "bersih", "tanpa", "bug", "desain", "yang", "elegan", "tidak", "butuh", "penjelasan", "fokus", "pada", "struktur", "dan", "kesederhanaan", "konsistensi", "adalah", "kunci", "sebuah", "perjalanan", "bukan", "tujuan"];
    const WORD_OPTIONS = [10, 25, 50, 100, '∞'];
    
    let currentWordCount = 25;
    let isInfinityMode = false;
    let lives = 3;
    let previousInputLength = 0;
    let sampleText = "";
    let charsData = [];
    let startTime = null;
    let caretTimeout;
    let totalWordsCount = 0;
    let liveStatsTimer = null;
    let historyDebounce;
    let isInputFocused = false;

    const textWrapper = document.getElementById('text-wrapper');
    const hiddenInput = document.getElementById('hidden-input');
    const caret = document.getElementById('caret');
    const movingCanvas = document.getElementById('moving-canvas');
    const progressText = document.getElementById('progress');
    const typingArea = document.getElementById('typing-area');
    const resultArea = document.getElementById('result');
    const settingsMenu = document.getElementById('settings-menu');
    const settingsOptions = document.getElementById('settings-options');
    const settingsOverlay = document.getElementById('settings-overlay');
    const settingsToggle = document.getElementById('settings-toggle');
    const liveStatsContainer = document.getElementById('live-stats-container');
    const liveWpmEl = document.getElementById('live-wpm');
    const liveAccEl = document.getElementById('live-acc');
    const bestScoreDisplay = document.getElementById('best-score-display');
    const historyList = document.getElementById('history-list');
    const historyPanel = document.getElementById('history-panel');

    function setHistoryVisible(visible) {
      if (visible) {
        historyPanel.classList.remove('is-hidden');
      } else {
        historyPanel.classList.add('is-hidden');
      }
    }

    function checkKeyboardAndFocus() {
      let keyboardHeight = 0;
      if (window.visualViewport) {
        const vv = window.visualViewport;
        keyboardHeight = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      }

      if (isInputFocused || keyboardHeight > 0) {
        setHistoryVisible(false);
      } else {
        setHistoryVisible(true);
      }
    }

    function handleViewportChange() {
      clearTimeout(historyDebounce);
      historyDebounce = setTimeout(checkKeyboardAndFocus, 100);
    }

    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', handleViewportChange);
      window.visualViewport.addEventListener('scroll', handleViewportChange);
    }
    window.addEventListener('resize', handleViewportChange);

    hiddenInput.addEventListener('focus', () => {
      typingArea.classList.add('is-focused');
      isInputFocused = true;
      handleViewportChange();
    });

    hiddenInput.addEventListener('blur', () => {
      typingArea.classList.remove('is-focused');
      isInputFocused = false;
      handleViewportChange();
    });

    function closeSettings() {
      settingsMenu.style.display = 'none';
      settingsOverlay.style.display = 'none';
      hiddenInput.focus();
    }

    function renderSettings() {
      settingsOptions.innerHTML = '';
      WORD_OPTIONS.forEach(num => {
        const btn = document.createElement('button');
        btn.className = `word-count-btn ${num === currentWordCount ? 'active' : ''}`;
        btn.innerText = num;
        btn.onclick = () => {
          currentWordCount = num;
          closeSettings();
          renderSettings();
          init(false);
        };
        settingsOptions.appendChild(btn);
      });
    }

    settingsToggle.addEventListener('click', () => {
      settingsMenu.style.display = 'flex';
      settingsOverlay.style.display = 'block';
      settingsOptions.querySelector('.word-count-btn').focus();
    });

    settingsOverlay.addEventListener('click', closeSettings);
    
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && settingsMenu.style.display === 'flex') {
        closeSettings();
      }
    });

    function loadHistory() {
      const data = JSON.parse(localStorage.getItem('typingHistory')) || { runs: [], best: {} };
      const modeKey = currentWordCount.toString();
      const bestForMode = data.best[modeKey];
      
      bestScoreDisplay.textContent = bestForMode ? `Best (${modeKey}): ${bestForMode.wpm} wpm • ${bestForMode.acc}%` : `Best (${modeKey}): -`;
      
      historyList.innerHTML = '';
      const recentRuns = data.runs.slice(0, 5);
      if(recentRuns.length === 0) {
        historyList.innerHTML = '<div class="history-row">Belum ada data</div>';
      } else {
        recentRuns.forEach(run => {
          const row = document.createElement('div');
          row.className = 'history-row';
          const d = new Date(run.date);
          const timeStr = `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
          row.innerHTML = `<span>Mode: ${run.mode} | ${timeStr}</span> <span>${run.wpm} wpm • ${run.acc}%</span>`;
          historyList.appendChild(row);
        });
      }
    }

    function saveScore(wpm, acc) {
      let data = JSON.parse(localStorage.getItem('typingHistory')) || { runs: [], best: {} };
      const modeKey = currentWordCount.toString();
      
      data.runs.unshift({ mode: modeKey, wpm, acc, date: Date.now() });
      if (data.runs.length > 20) data.runs.pop();
      
      if (!data.best[modeKey]) data.best[modeKey] = { wpm: 0, acc: 0 };
      if (wpm > data.best[modeKey].wpm || (wpm === data.best[modeKey].wpm && acc > data.best[modeKey].acc)) {
        data.best[modeKey] = { wpm, acc };
      }
      
      localStorage.setItem('typingHistory', JSON.stringify(data));
      loadHistory();
    }

    function generateRandomText(count) {
      let words = [];
      let capitalizeNext = true;
      for (let i = 0; i < count; i++) {
        let word = WORD_LIST[Math.floor(Math.random() * WORD_LIST.length)];
        if (capitalizeNext) {
          word = word.charAt(0).toUpperCase() + word.slice(1);
          capitalizeNext = false;
        }
        if (i < count - 1 && Math.random() < 0.15) {
          word += ",";
        } else if (i < count - 1 && Math.random() < 0.15) {
          word += ".";
          capitalizeNext = true;
        } else if (!isInfinityMode && i === count - 1) {
          word += ".";
        }
        words.push(word);
      }
      return words.join(' ');
    }

    function appendMoreWords(count) {
      const newWordsText = generateRandomText(count);
      const words = newWordsText.split(' ');
      
      words.forEach((word) => {
        const wordEl = document.createElement('div');
        wordEl.className = 'word';
        word.split('').forEach(char => {
          const charEl = document.createElement('span');
          charEl.className = 'char';
          charEl.innerText = char;
          wordEl.appendChild(charEl);
          charsData.push({ el: charEl, expected: char });
        });
        
        const spaceEl = document.createElement('span');
        spaceEl.className = 'char';
        spaceEl.textContent = ' ';
        wordEl.appendChild(spaceEl);
        charsData.push({ el: spaceEl, expected: ' ' });
        
        textWrapper.appendChild(wordEl);
      });
    }

    function updateProgressDisplay(currentWordIdx) {
      if (isInfinityMode) {
        let livesDisplay = '● '.repeat(lives) + '○ '.repeat(3 - lives);
        progressText.innerText = `${currentWordIdx} 🔥 | ${livesDisplay}`;
      } else {
        progressText.innerText = `${Math.min(currentWordIdx, totalWordsCount)}/${totalWordsCount}`;
      }
    }

    function loopLiveStats() {
      if (!startTime) return;
      const now = Date.now();
      const mins = (now - startTime) / 60000;
      const typedLen = hiddenInput.value.length;
      
      if (mins > 0 && typedLen > 0) {
        let correctCount = 0;
        for(let i = 0; i < typedLen; i++) {
          if(hiddenInput.value[i] === charsData[i].expected) correctCount++;
        }
        const grossWpm = Math.round((typedLen / 5) / mins);
        const acc = Math.round((correctCount / typedLen) * 100);
        
        liveWpmEl.textContent = grossWpm;
        liveAccEl.textContent = acc;
      }
    }

    function init(keepText = false) {
      isInfinityMode = currentWordCount === '∞';
      lives = 3;
      previousInputLength = 0;
      clearInterval(liveStatsTimer);
      liveStatsContainer.classList.remove('visible');
      liveWpmEl.textContent = '0';
      liveAccEl.textContent = '100';

      if (!keepText || isInfinityMode) {
        let initialCount = isInfinityMode ? 40 : currentWordCount;
        sampleText = generateRandomText(initialCount);
      }
      
      textWrapper.innerHTML = '';
      movingCanvas.style.transform = 'translateY(0px)';
      hiddenInput.value = '';
      hiddenInput.disabled = false;
      charsData = [];
      startTime = null;
      
      const words = sampleText.split(' ');
      totalWordsCount = words.length;
      updateProgressDisplay(0);
      
      words.forEach((word, wordIndex) => {
        const wordEl = document.createElement('div');
        wordEl.className = 'word';
        word.split('').forEach(char => {
          const charEl = document.createElement('span');
          charEl.className = 'char';
          charEl.innerText = char;
          wordEl.appendChild(charEl);
          charsData.push({ el: charEl, expected: char });
        });
        
        if (wordIndex < words.length - 1 || isInfinityMode) {
          const spaceEl = document.createElement('span');
          spaceEl.className = 'char';
          spaceEl.textContent = ' ';
          wordEl.appendChild(spaceEl);
          charsData.push({ el: spaceEl, expected: ' ' });
        }
        textWrapper.appendChild(wordEl);
      });
      
      document.querySelectorAll('.screen-only').forEach(el => el.style.display = '');
      document.getElementById('header-area').style.display = 'flex';
      typingArea.style.display = 'block';
      resultArea.style.display = 'none';
      
      loadHistory();
      updateCaretAndScroll();
      hiddenInput.blur(); 
      typingArea.classList.remove('is-focused');
      handleViewportChange();
    }

    function calculateResult() {
      hiddenInput.disabled = true;
      clearInterval(liveStatsTimer);
      liveStatsContainer.classList.remove('visible');
      
      const endTime = Date.now();
      const timeInMinutes = (endTime - startTime) / 60000;
      const inputVal = hiddenInput.value;
      
      let correctCount = 0;
      for(let i = 0; i < inputVal.length; i++) {
        if(inputVal[i] === charsData[i].expected) correctCount++;
      }
      
      const errors = inputVal.length - correctCount;
      const grossWPM = (inputVal.length / 5) / timeInMinutes;
      const errorPenalty = errors / timeInMinutes;
      let netWPM = Math.round(grossWPM - errorPenalty);
      if (netWPM < 0) netWPM = 0; 
      
      let accuracy = 0;
      if (inputVal.length > 0) {
         accuracy = Math.round((correctCount / inputVal.length) * 100);
      }
      
      document.getElementById('wpm').innerText = netWPM;
      document.getElementById('accuracy').innerText = accuracy + '%';
      
      document.querySelectorAll('.screen-only').forEach(el => el.style.display = 'none');
      resultArea.style.display = 'flex';
      
      saveScore(netWPM, accuracy);
      handleViewportChange();
    }

    function updateCaretAndScroll() {
      const val = hiddenInput.value;
      const index = val.length;
      
      let currentWordIdx = 0;
      if (val.length > 0) {
        currentWordIdx = val.split(' ').length - 1;
      }
      updateProgressDisplay(currentWordIdx);
      
      if (!isInfinityMode && index === charsData.length) {
        updateProgressDisplay(totalWordsCount);
        calculateResult();
        return;
      }

      if (isInfinityMode && (charsData.length - index < 100)) {
        appendMoreWords(20);
      }

      if (index >= charsData.length) return;

      const activeCharEl = charsData[index].el;
      const parentRect = movingCanvas.getBoundingClientRect();
      const charRect = activeCharEl.getBoundingClientRect();

      caret.style.left = (charRect.left - parentRect.left) + 'px';
      caret.style.top = (charRect.top - parentRect.top) + 'px';
      
      const offsetTop = activeCharEl.offsetTop;
      if (offsetTop >= 55) {
        movingCanvas.style.transform = `translateY(-${offsetTop - 55}px)`;
      } else {
        movingCanvas.style.transform = `translateY(0px)`;
      }
    }

    hiddenInput.addEventListener('input', () => {
      if (!startTime) {
        startTime = Date.now();
        liveStatsContainer.classList.add('visible');
        liveStatsTimer = setInterval(loopLiveStats, 500);
      }
      
      const val = hiddenInput.value;
      
      if (isInfinityMode && val.length > previousInputLength) {
        for(let i = previousInputLength; i < val.length; i++) {
          if (val[i] !== charsData[i].expected) {
            lives--;
          }
        }
        if (lives <= 0) {
          charsData[val.length - 1].el.classList.add('incorrect');
          updateProgressDisplay(val.split(' ').length - 1);
          calculateResult();
          return;
        }
      }
      previousInputLength = val.length;

      caret.classList.remove('blink');
      caret.classList.add('typing');
      clearTimeout(caretTimeout);
      caretTimeout = setTimeout(() => {
        caret.classList.remove('typing');
        caret.classList.add('blink');
      }, 500);

      charsData.forEach((charObj, i) => {
        charObj.el.classList.remove('correct', 'incorrect');
        if (i < val.length) {
          if (val[i] === charObj.expected) charObj.el.classList.add('correct');
          else charObj.el.classList.add('incorrect');
        }
      });
      updateCaretAndScroll();
    });

    document.addEventListener('click', (e) => {
      if (e.target.closest('button') || e.target.closest('#settings-menu') || e.target.closest('#settings-toggle') || e.target.closest('svg')) {
        return;
      }
      if (!hiddenInput.disabled && settingsMenu.style.display !== 'flex') {
        hiddenInput.focus();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') return;
      if (!hiddenInput.disabled && settingsMenu.style.display !== 'flex' && document.activeElement !== hiddenInput) {
        hiddenInput.focus();
      }
    });

    document.getElementById('next-hint').addEventListener('click', () => init(false));
    document.getElementById('restart-hint').addEventListener('click', () => init(true));
    document.getElementById('next-btn-result').addEventListener('click', () => init(false));
    document.getElementById('restart-btn-result').addEventListener('click', () => init(true));

    renderSettings();
    init(false);
  </script>
</body>
</html>
